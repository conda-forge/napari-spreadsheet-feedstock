{% set name = "napari-spreadsheet" %}
{% set version = "0.0.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/napari_spreadsheet-{{ version }}.tar.gz
  sha256: 674bdb8eacd2b65af95133303046fac7d9cfef20a5888a675ff98397bcea04e2

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools >=42.0.0
    - wheel
  run:
    - magicgui
    - napari
    - numpy
    - pandas
    - python >={{ python_min }}
    - qtpy
    - tabulous >=0.5.0

test:
  imports:
    - napari_spreadsheet
  commands:
    - pip list
    - pip check
  requires:
    - pip
    - pyqt
    - python {{ python_min }}

about:
  home: https://pypi.org/project/napari-spreadsheet
  summary: A spreadsheet widget for napari
  license: BSD-3-Clause
  license_file: LICENSE
  dev_url: https://github.com/hanjinliu/napari-spreadsheet

extra:
  recipe-maintainers:
    - goanpeca
    - hanjinliu
    - jaimergp
